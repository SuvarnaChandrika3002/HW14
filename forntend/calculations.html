<!DOCTYPE html>
<html>
<head>
    <title>Calculations</title>
</head>
<body>
    <h2>Your Calculations</h2>

    <button onclick="logout()">Logout</button>

    <h3>Add Calculation</h3>
    <form id="addForm">
        <input id="operation" placeholder="+ - * /" required>
        <input id="operand1" type="number" placeholder="Operand 1" required>
        <input id="operand2" type="number" placeholder="Operand 2" required>
        <button type="submit">Add</button>
    </form>

    <h3>List</h3>
    <div id="list"></div>

    <script src="script.js"></script>
</body>
</html>
