name: CI/CD Pipeline - HW14

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ---------------------------
      # 1. CHECKOUT REPOSITORY
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # 2. SETUP PYTHON (Backend)
      # ---------------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # ---------------------------
      # 3. INSTALL BACKEND DEPENDENCIES
      # ---------------------------
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      # ---------------------------
      # 4. START FASTAPI BACKEND + PRINT LOGS
      # ---------------------------
      - name: Start FastAPI Backend
        run: |
          cd backend
          nohup python3 -m uvicorn main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          sleep 8
          echo "===== BACKEND LOG START ====="
          cat backend.log || true
          echo "===== BACKEND LOG END ====="

      # ---------------------------
      # 5. SETUP NODE (Frontend + Tests)
      # ---------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ---------------------------
      # 6. INSTALL PLAYWRIGHT + BROWSERS
      # ---------------------------
      - name: Install frontend dependencies & Playwright
        run: |
          npm ci
          npx playwright install --with-deps

      # ---------------------------
      # 7. START FRONTEND SERVER
      # ---------------------------
      - name: Start Frontend Server
        run: |
          cd forntend
          nohup python3 -m http.server 5500 > frontend.log 2>&1 &
          sleep 3

      # ---------------------------
      # 8. RUN PLAYWRIGHT TESTS
      # ---------------------------
      - name: Run Playwright Tests
        run: npx playwright test

      # ---------------------------
      # 9. DOCKER LOGIN
      # ---------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------------------
      # 10. BUILD DOCKER IMAGE
      # ---------------------------
      - name: Build Docker Image
        run: docker build -t sc673/hw14-backend ./backend

      # ---------------------------
      # 11. PUSH DOCKER IMAGE
      # ---------------------------
      - name: Push Docker Image
        run: docker push sc673/hw14-backend
